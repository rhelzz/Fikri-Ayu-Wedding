    <ellipse cx="32" cy="30" rx="11" ry="6.4" transform="rotate(-34 32 30)"/>
    <ellipse cx="56" cy="52" rx="11" ry="6.4" transform="rotate(-30 56 52)"/>
    <ellipse cx="84" cy="82" rx="12" ry="7"   transform="rotate(-25 84 82)"/>
