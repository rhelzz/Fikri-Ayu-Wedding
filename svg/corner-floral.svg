  <!-- peach flower 2 (smaller) -->
  <g transform="translate(196,196) scale(0.8)">
    <g fill="#f2d6bd" stroke="#dca97f" stroke-width="1.2">
      <ellipse cx="0" cy="-12" rx="6" ry="10"/>
      <ellipse cx="11" cy="-4" rx="6" ry="10" transform="rotate(72)"/>
      <ellipse cx="7" cy="10" rx="6" ry="10" transform="rotate(144)"/>
      <ellipse cx="-7" cy="10" rx="6" ry="10" transform="rotate(216)"/>
      <ellipse cx="-11" cy="-4" rx="6" ry="10" transform="rotate(288)"/>
