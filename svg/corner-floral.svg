<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none">
  <!-- stems -->
  <g stroke="#9aa97f" stroke-width="2.1" stroke-linecap="round">
    <path d="M14 24 C80 44 140 98 172 200"/>
    <path d="M42 38 C38 22 26 17 14 21"/>
    <path d="M68 62 C64 45 51 39 39 43"/>
    <path d="M96 94 C94 75 82 68 68 70"/>
